name: Release

# Triggered when a version tag (v*) is pushed.
# Convention: tag name = v<version>, e.g. v0.1.0, v0.2.0-rc1
# The tag must match an existing rockspec: lua-yar-<version>-1.rockspec
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Required to create releases and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Expose secret to env so step-level `if` can check for emptiness.
      # If not configured, LuaRocks upload is skipped automatically.
      LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        # v0.1.0 -> 0.1.0,  v0.2.0-rc1 -> 0.2.0-rc1
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify rockspec exists
        run: |
          ROCKSPEC="lua-yar-${{ steps.version.outputs.version }}-1.rockspec"
          if [ ! -f "$ROCKSPEC" ]; then
            echo "::error::Rockspec '$ROCKSPEC' not found. Create it before tagging."
            exit 1
          fi
          echo "rockspec=$ROCKSPEC" >> $GITHUB_ENV

      - name: Create source tarball
        run: |
          git archive --format=tar.gz \
            --prefix=lua-yar-${{ steps.version.outputs.version }}/ \
            -o lua-yar-${{ steps.version.outputs.version }}.tar.gz HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: lua-yar v${{ steps.version.outputs.version }}
          body: |
            纯 Lua 实现的 Yar RPC 协议框架，兼容 PHP Yar / yar-c 互操作。

            ## 安装

            ```bash
            luarocks install lua-yar
            ```

            ## 主要特性

            - JSON / Msgpack 双 packager（纯 Lua 实现）
            - HTTP / TCP 双传输，支持 `http://` `https://` `tcp://` `unix://`
            - OpenResty cosocket 注入（`Client.set_socket(ngx.socket)`）
            - 结构化 Error 对象（5 类错误码）
            - 零 C 扩展依赖，网络层可插拔

            ## 文档

            - [README](https://github.com/fangfengxiang/lua-yar#readme)
            - [API 文档](https://github.com/fangfengxiang/lua-yar/blob/main/docs/api.md)
            - [完整变更日志](https://github.com/fangfengxiang/lua-yar/blob/main/CHANGELOG.md)
          # Append auto-generated commit list after the body above
          generate_release_notes: true
          # Tags containing a hyphen (e.g. v0.1.0-rc1) are pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            lua-yar-${{ steps.version.outputs.version }}.tar.gz
            ${{ env.rockspec }}

      # --- Optional: publish to LuaRocks.org ---
      # Requires LUAROCKS_API_KEY secret. Skipped if not configured.
      - name: Setup Lua
        if: ${{ env.LUAROCKS_API_KEY != '' }}
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: '5.1'

      - name: Setup LuaRocks
        if: ${{ env.LUAROCKS_API_KEY != '' }}
        uses: leafo/gh-actions-luarocks@v6

      - name: Upload to LuaRocks
        if: ${{ env.LUAROCKS_API_KEY != '' }}
        run: luarocks upload "${{ env.rockspec }}" --api-key="$LUAROCKS_API_KEY"
