name = lua-yar
version = 0.0.1
abstract = Yar RPC Framework for Lua
author = fangfengxiang <fangfengxiang@gmail.com>
license = Apache-2.0
homepage = https://github.com/fangfengxiang/lua-yar
lib_dir = src
is_relocatable = true

[deps]
lua >= 5.1

[install]
yar/init.lua
yar/client.lua
yar/error.lua
yar/log.lua
yar/util.lua
yar/message/request.lua
yar/message/response.lua
yar/packager/json.lua
yar/packager/msgpack.lua
