# test/nginx.conf
# OpenResty E2E 测试用 nginx 配置（参考模板，实际运行由 openresty_http_e2e.sh 动态生成）
#
# 注意：本文件仅为参考模板。实际测试由 test/openresty_http_e2e.sh 用 heredoc
# 动态生成 nginx.conf（用绝对路径替换 $PWD，因为 nginx 把 $PWD 当作变量而非 shell 变量）。
#
# 如需手动启动：
#   1. 将下方 <PROJECT_ROOT> 替换为 lua-yar 绝对路径
#   2. openresty -p /tmp/yar_nginx_test/ -c /path/to/test/nginx.conf
#   3. openresty -p /tmp/yar_nginx_test/ -s stop
#
# 测试端口：9702（HTTP YAR server，openresty job 9700-9729 区段）

worker_processes  1;
error_log  /dev/stderr  warn;
pid        /tmp/yar_nginx_test/nginx.pid;

events {
    worker_connections  256;
}

http {
    lua_package_path "<PROJECT_ROOT>/src/?.lua;<PROJECT_ROOT>/src/?/init.lua;<PROJECT_ROOT>/test/?.lua;;";

    init_by_lua_block {
        -- 预加载 server handler 模块（进程级 Server 实例）
        require("test.nginx_e2e_server")
    }

    server {
        listen 127.0.0.1:9702;
        server_name localhost;

        location /api {
            content_by_lua_block {
                require("test.nginx_e2e_server").serve()
            }
        }

        location /health {
            content_by_lua_block {
                ngx.print("ok")
            }
        }
    }
}
